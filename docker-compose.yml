services:
  postgres:
    image: postgres:16
    container_name: pg-test
    environment:
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-test
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TestPass123#"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./init-scripts/mssql:/scripts:ro
    entrypoint: >
      sh -c "/opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P 'TestPass123#' -Q \"IF DB_ID('testdb') IS NULL CREATE DATABASE testdb\" &&
             /opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P 'TestPass123#' -d testdb -i /scripts/01-seed.sql"
    restart: "no"

  mysql:
    image: mysql:8
    container_name: mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: TestPass123
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init-scripts/mysql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: mariadb-test
    environment:
      MARIADB_ROOT_PASSWORD: TestPass123
      MARIADB_DATABASE: testdb
    ports:
      - "3307:3306"
    volumes:
      - mariadbdata:/var/lib/mysql
      - ./init-scripts/mariadb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-test
    environment:
      ORACLE_PASSWORD: TestPass123
      ORACLE_DATABASE: testdb
      APP_USER: appuser
      APP_USER_PASSWORD: TestPass123
    ports:
      - "1521:1521"
    volumes:
      - oracledata:/opt/oracle/oradata
      - ./init-scripts/oracle:/container-entrypoint-initdb.d/startup:ro
    restart: unless-stopped

  sqlite-init:
    image: keinos/sqlite3:latest
    container_name: sqlite-init
    volumes:
      - ./data/sqlite:/data
      - ./init-scripts/sqlite:/scripts:ro
    entrypoint: sh -c "sqlite3 /data/testdb.db < /scripts/01-seed.sql"
    restart: "no"

volumes:
  pgdata:
  mssqldata:
  mysqldata:
  mariadbdata:
  oracledata:
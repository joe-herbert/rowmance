name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rowmance
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun install

      - name: Debug signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          echo "Key length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "Key first 30 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:30}"
          echo "Key last 10 chars: ${TAURI_SIGNING_PRIVATE_KEY: -10}"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | wc -l

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Rowmance ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download this version of Rowmance.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
          updaterJsonKeepUniversal: true

      - name: Verify signing succeeded
        run: |
          COUNT=$(find src-tauri/target -name "*.sig" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No signature files found after build. Check that TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets are correct."
            exit 1
          fi
          echo "Found $COUNT signature file(s) — signing succeeded."
